<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>BrickWorld | Star Wars Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "primary": "#f49d25" },
                    fontFamily: { "display": ["Spline Sans"] },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Spline Sans', sans-serif; overflow: hidden; background-color: #0b0f19; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(-5deg); }
        }
        .lego-char { animation: float 7s ease-in-out infinite; pointer-events: none; }
        .char-alt { animation-delay: -3.5s; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative text-white">

    <img src="https://www.lego.com/cdn/cs/set/assets/blt9d8b8a5d3f8e6c1a/Minifigure_Yoda.png" 
         class="lego-char absolute top-10 right-10 w-28 opacity-30 hidden lg:block" alt="Yoda">
    <img src="https://www.lego.com/cdn/cs/set/assets/blt56e18f8303e83921/Minifigure_Stormtrooper.png" 
         class="lego-char char-alt absolute bottom-12 left-12 w-36 opacity-25 hidden lg:block" alt="Stormtrooper">

    <div class="max-w-md w-full bg-white/10 backdrop-blur-md rounded-[2.5rem] shadow-2xl shadow-black/50 overflow-hidden border border-white/10 z-10">
        <div class="p-8 md:p-10">
            <div class="flex flex-col items-center mb-6">
                <div class="bg-primary w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg shadow-primary/40 mb-3">
                    <span class="text-white font-black text-xl">B</span>
                </div>
                <h2 class="text-xl font-black tracking-tighter text-white uppercase">Become a Legend</h2>
                <p class="text-slate-400 text-xs mt-1">Join the galactic building community</p>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <button class="flex items-center justify-center gap-2 bg-slate-800/50 border border-slate-700 py-3 rounded-2xl hover:bg-slate-700 transition-all active:scale-95 group">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
                    <span class="text-sm font-bold text-slate-200">Google</span>
                </button>
                <button class="flex items-center justify-center gap-2 bg-slate-800/50 border border-slate-700 py-3 rounded-2xl hover:bg-slate-700 transition-all active:scale-95 group">
                    <img src="https://www.svgrepo.com/show/475647/facebook-color.svg" class="w-5 h-5" alt="Facebook">
                    <span class="text-sm font-bold text-slate-200">Facebook</span>
                </button>
            </div>

            <div class="relative mb-6">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
                <div class="relative flex justify-center text-[10px] uppercase"><span class="bg-[#1a1f2b] px-3 text-slate-500 font-bold tracking-[0.2em]">Or use email</span></div>
            </div>

            <form action="#" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[11px] font-bold text-slate-400 ml-1 uppercase">Full Name</label>
                    <input type="text" placeholder="Anakin Skywalker" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary/40 outline-none text-sm text-white"/>
                </div>

                <div class="space-y-1">
                    <label class="text-[11px] font-bold text-slate-400 ml-1 uppercase">Holo-Mail</label>
                    <input type="email" placeholder="chosenone@jedi.com" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary/40 outline-none text-sm text-white"/>
                </div>

                <div class="space-y-1">
                    <label class="text-[11px] font-bold text-slate-400 ml-1 uppercase">Secret Code</label>
                    <input type="password" placeholder="••••••••" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary/40 outline-none text-sm text-white"/>
                </div>

                <button type="submit" class="w-full bg-primary hover:bg-orange-500 text-white font-black py-4 rounded-xl shadow-lg shadow-primary/20 transition-all mt-2 active:scale-[0.98]">
                    CREATE ACCOUNT
                </button>
            </form>

            <div class="mt-6 text-center pt-4 border-t border-white/5">
                <p class="text-xs text-slate-500">Already an ally? <a href="#" class="text-primary font-bold hover:underline">Login</a></p>
            </div>
        </div>
    </div>

    <div class="absolute inset-0 z-0 pointer-events-none opacity-20 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]"></div>

</body>
</html>
