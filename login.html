<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>BrickWorld | Star Wars Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "primary": "#f49d25" },
                    fontFamily: { "display": ["Spline Sans"] },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Spline Sans', sans-serif; overflow: hidden; background-color: #0b0f19; }
        /* Hiệu ứng trôi nổi nhẹ nhàng cho nhân vật */
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        .lego-char { animation: float 6s ease-in-out infinite; pointer-events: none; }
        .char-2 { animation-delay: -2s; }
        .char-3 { animation-delay: -4s; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative text-white">

    <img src="https://www.lego.com/cdn/cs/set/assets/blt56e18f8303e83921/75363.png" 
         class="lego-char absolute top-10 left-10 w-32 opacity-20 hidden lg:block" alt="Darth Vader">
    
    <img src="https://www.lego.com/cdn/cs/set/assets/blta6b772421398860c/75362.png" 
         class="lego-char char-2 absolute bottom-10 left-20 w-40 opacity-30 hidden lg:block" alt="Luke Skywalker">
    
    <img src="https://www.lego.com/cdn/cs/set/assets/blt0a8972d057a7593c/75364.png" 
         class="lego-char char-3 absolute top-20 right-10 w-36 opacity-25 hidden lg:block" alt="Princess Leia">
    
    <img src="https://www.lego.com/cdn/cs/set/assets/bltf95583f707f4337b/75365.png" 
         class="lego-char absolute bottom-20 right-20 w-32 opacity-20 hidden lg:block" alt="Chewbacca">

    <div class="max-w-md w-full bg-white/10 backdrop-blur-sm rounded-3xl shadow-xl shadow-slate-900/50 overflow-hidden border border-slate-700 z-10">
        <div class="p-8 md:p-10">
            <div class="flex flex-col items-center mb-10">
                <div class="bg-primary w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg shadow-primary/30 mb-4">
                    <span class="text-white font-black text-2xl">B</span>
                </div>
                <h2 class="text-2xl font-black tracking-tighter text-white">MAY THE BRICK BE WITH YOU</h2>
                <p class="text-slate-400 text-sm mt-1">Ready to build your galaxy?</p>
            </div>

            <form action="#" class="space-y-5">
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-300 ml-1">Email</label>
                    <input type="email" placeholder="name@example.com" class="w-full bg-slate-800 border border-slate-700 rounded-2xl py-3.5 px-5 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-sm text-white"/>
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-300 ml-1">Password</label>
                    <input type="password" placeholder="••••••••" class="w-full bg-slate-800 border border-slate-700 rounded-2xl py-3.5 px-5 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-sm text-white"/>
                </div>
                <button type="submit" class="w-full bg-primary hover:bg-orange-500 text-white font-black py-4 rounded-2xl shadow-lg shadow-primary/30 transition-all mt-2 active:scale-[0.98]">LOGIN</button>
            </form>

            <div class="mt-8 text-center border-t border-slate-700 pt-6">
                <p class="text-sm text-slate-400">Join the resistance. <a href="#" class="text-primary font-black hover:underline">Sign Up</a></p>
            </div>
        </div>
    </div>

</body>
</html>
